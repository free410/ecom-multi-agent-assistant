<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="760" rx="36" fill="#F4F8FF"/>
  <rect x="32" y="32" width="1536" height="696" rx="32" fill="url(#bg)"/>
  <rect x="72" y="84" width="714" height="592" rx="28" fill="#FFFFFF" fill-opacity="0.9"/>
  <text x="112" y="162" fill="#16304F" font-size="54" font-weight="700">多 Agent 电商运营智能助手平台</text>
  <text x="112" y="214" fill="#5E7392" font-size="24">LangGraph · FastAPI · React · Redis / MySQL · Qwen / DeepSeek / Mock</text>

  <rect x="112" y="258" width="182" height="48" rx="24" fill="#E7F0FF"/>
  <text x="145" y="290" fill="#2F5BEA" font-size="22" font-weight="600">多 Agent 编排</text>
  <rect x="310" y="258" width="168" height="48" rx="24" fill="#EAF8F1"/>
  <text x="344" y="290" fill="#1B8F5A" font-size="22" font-weight="600">Tool Calling</text>
  <rect x="494" y="258" width="164" height="48" rx="24" fill="#FFF1E3"/>
  <text x="529" y="290" fill="#E08A17" font-size="22" font-weight="600">结构化输出</text>

  <text x="112" y="362" fill="#1F3556" font-size="30" font-weight="700">核心能力</text>
  <text x="112" y="414" fill="#304968" font-size="24">• 商品问答：基于商品卖点、FAQ 与售后规则回答问题</text>
  <text x="112" y="458" fill="#304968" font-size="24">• 活动文案：按主题与人群定向生成营销文案</text>
  <text x="112" y="502" fill="#304968" font-size="24">• 评论分析：提取差评关键词并输出运营建议</text>
  <text x="112" y="546" fill="#304968" font-size="24">• 竞品整理：结构化对比亮点、弱项与价格带</text>
  <text x="112" y="590" fill="#304968" font-size="24">• 运营日报：把任务结果沉淀为日报摘要</text>

  <rect x="848" y="92" width="664" height="180" rx="28" fill="#173454"/>
  <text x="892" y="152" fill="#FFFFFF" font-size="30" font-weight="700">演示视角</text>
  <text x="892" y="196" fill="#D8E7FF" font-size="22">前端可直接看到：</text>
  <text x="892" y="232" fill="#D8E7FF" font-size="22">意图、置信度、路由原因、执行路径、已用工具、工具耗时</text>

  <rect x="848" y="300" width="316" height="164" rx="24" fill="#FFFFFF" fill-opacity="0.95"/>
  <text x="884" y="352" fill="#173454" font-size="26" font-weight="700">执行链路</text>
  <text x="884" y="394" fill="#536B8B" font-size="22">ContextLoader</text>
  <text x="884" y="426" fill="#536B8B" font-size="22">→ IntentAgent</text>
  <text x="884" y="458" fill="#536B8B" font-size="22">→ ContentAgent</text>

  <rect x="1196" y="300" width="316" height="164" rx="24" fill="#FFFFFF" fill-opacity="0.95"/>
  <text x="1232" y="352" fill="#173454" font-size="26" font-weight="700">工具状态</text>
  <text x="1232" y="394" fill="#536B8B" font-size="22">generate_campaign_copy</text>
  <text x="1232" y="426" fill="#536B8B" font-size="22">summarize_reviews</text>
  <text x="1232" y="458" fill="#536B8B" font-size="22">compare_competitors</text>

  <rect x="848" y="500" width="664" height="152" rx="24" fill="#FFFFFF" fill-opacity="0.95"/>
